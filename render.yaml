services:
  # Backend API Server
  - type: web
    name: yappy-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter ...@workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PNPM_VERSION
        value: 9.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: yappy-db
          property: connectionString
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: web
    name: yappy-downloader
    runtime: static
    buildCommand: pnpm install && pnpm --filter ...@workspace/yappy-video-downloader run build
    staticPublishPath: artifacts/yappy-video-downloader/dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PNPM_VERSION
        value: 9.12.0
      - key: VITE_API_URL
        fromService:
          type: web
          name: yappy-api
          property: host
    # This ensures that SPAs work correctly on Render
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: yappy-db
    plan: free
