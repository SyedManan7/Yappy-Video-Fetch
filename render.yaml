services:
  # Backend API Server
  - type: web
    name: yappy-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: yappy-db
          property: connectionString
      - key: PORT
        value: 10000

  # Frontend Static Site
  - type: static_site
    name: yappy-downloader
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build --filter @workspace/yappy-video-downloader
    publishPath: artifacts/yappy-video-downloader/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: yappy-api
          property: url
    # This ensures that SPAs work correctly on Render
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: yappy-db
    plan: free
